services:
  - type: web
    name: scam-sentinel
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.3
      - key: DATABASE_URL
        fromDatabase:
          name: scam-sentinel-db
          property: connectionString

databases:
  - name: scam-sentinel-db
    plan: free
